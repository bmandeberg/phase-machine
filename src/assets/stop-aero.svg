<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 80 80">
	<defs>
		<linearGradient id="discStopAero" x1="40" y1="2" x2="40" y2="78" gradientUnits="userSpaceOnUse">
			<stop offset="0" stop-color="#ffffff" stop-opacity="0.3"/>
			<stop offset="1" stop-color="#ec5b58" stop-opacity="0.32"/>
		</linearGradient>
		<filter id="glowStopAero" x="-60%" y="-60%" width="220%" height="220%">
			<feGaussianBlur stdDeviation="1.7" result="b"/>
			<feMerge>
				<feMergeNode in="b"/>
				<feMergeNode in="SourceGraphic"/>
			</feMerge>
		</filter>
	</defs>
	<!-- disc: flat glass with a white rim -->
	<circle cx="40" cy="40" r="38.2" fill="url(#discStopAero)" stroke="#ffffff" stroke-opacity="0.9" stroke-width="2"/>
