		<path fill="#f4514d" fill-opacity="0.85" stroke="#ffffff" stroke-opacity="0.92" stroke-width="2"
			stroke-linejoin="round" stroke-linecap="round"
			d="M54.2,52.2c0,1.1-0.9,2-2,2H27.8c-1.1,0-2-0.9-2-2V27.8c0-1.1,0.9-2,2-2h24.4c1.1,0,2,0.9,2,2V52.2z"/>
	</g>
